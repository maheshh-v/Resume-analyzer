; Repo-root pytest config. Scopes a bare `pytest` (run from the root) to the eval harness
; tests only — the backend suite has its own config at apps/api/pytest.ini and is run from
; there (`make test-api`). Eval tests are deliberately synchronous (they wrap the async
; runners in asyncio.run) so this suite needs no asyncio plugin configuration.
[pytest]
testpaths = evals/tests
